<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Form Validation</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-container">

        <h2>Register</h2>

        <form id="signup-form">

            <!-- Full Name -->
            <label for="name">Full Name</label>
            <input
                type="text"
                id="name"
                placeholder="Enter your name"
                required
                aria-describedby="name-error"
            >
            <small id="name-error" class="error-msg"></small>

            <!-- Email -->
            <label for="email">Email Address</label>
            <input
                type="email"
                id="email"
                placeholder="Enter your email"
                required
                aria-describedby="email-error"
            >
            <small id="email-error" class="error-msg"></small>

            <!-- Password -->
            <label for="password">Password</label>
            <input
                type="password"
                id="password"
                placeholder="Enter your password"
                required
                aria-describedby="password-error"
            >
            <small id="password-error" class="error-msg"></small>

            <!-- Confirm Password -->
            <label for="confirm-password">Confirm Password</label>
            <input
                type="password"
                id="confirm-password"
                placeholder="Confirm your password"
                required
                aria-describedby="confirm-password-error"
            >
            <small id="confirm-password-error" class="error-msg"></small>

            <button type="submit">Register</button>

        </form>

    </div>

    <script src="script.js"></script>

</body>
</html>
